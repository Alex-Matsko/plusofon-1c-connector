version: '3.9'

services:
  connector:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - connector_data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  connector_data:
